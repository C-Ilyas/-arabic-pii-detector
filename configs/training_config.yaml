# Training configuration for Arabic PII detection
model:
  base_model: "aubmindlab/bert-base-arabertv02"
  # Alternative: 
  max_length: 256

data:
  train_path: "data/train.jsonl"
  val_path: "data/validation.jsonl"
  test_path: "data/test.jsonl"

training:
  output_dir: "models/arabic-pii-detector"
  num_train_epochs: 12
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.06
  early_stopping_patience: 3
  lr_scheduler_type: "cosine"
  logging_steps: 50
  eval_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  label_smoothing_factor: 0.0
  seed: 42
  fp16: true  
  report_to: "none"

labels:
  - "O"
  - "B-PERSON"
  - "I-PERSON"
  - "B-EMAIL"
  - "I-EMAIL"
  - "B-PHONE_NUMBER"
  - "I-PHONE_NUMBER"
  - "B-ADDRESS"
  - "I-ADDRESS"
  - "B-ACCOUNT_NUMBER"
  - "I-ACCOUNT_NUMBER"
  - "B-BANK_ACCOUNT_NUMBER"
  - "I-BANK_ACCOUNT_NUMBER"
  - "B-IBAN"
  - "I-IBAN"
